<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>INVENTHOR Beta İndir</title>
<style>
:root{--bg:#04070a;--card:#0c1117;--soft:#121920;--line:rgba(75,220,255,.35);--txt:#e8f7fa;--muted:#86a1a8;--cyan:#48dcff}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top,#0b1c24,#04070a 55%);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--txt)}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:100%;max-width:460px;background:rgba(12,17,23,.96);border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:0 0 30px rgba(72,220,255,.08)}
h1{margin:0;text-align:center;font-size:32px;letter-spacing:.08em}
.sub{text-align:center;color:var(--muted);margin:8px 0 22px;font-size:14px}
.btn{display:block;text-align:center;text-decoration:none;background:var(--cyan);color:#04070a;font-weight:800;border-radius:18px;padding:17px 16px;font-size:17px;margin:12px 0}
.btn2{display:block;text-align:center;text-decoration:none;background:var(--soft);color:var(--txt);border:1px solid var(--line);font-weight:700;border-radius:18px;padding:15px 16px;font-size:15px;margin:10px 0}
.info{background:var(--soft);border:1px solid rgba(75,220,255,.18);border-radius:18px;padding:14px;margin-top:16px;color:var(--muted);font-size:13px;line-height:1.45}
.small{font-size:12px;color:var(--muted);text-align:center;margin-top:16px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>INVENTHOR BETA</h1>
    <div class="sub">Beta APK hızlı indirme merkezi</div>

    <a class="btn" href="./INVENTHOR.apk" download>INVENTHOR Beta APK indir</a>
    <a class="btn2" href="./update_manifest.json">Sürüm bilgisini gör</a>

    <div class="info">
      <b>Kurulum:</b><br>
      1. APK indir.<br>
      2. Telefon izin isterse “Bilinmeyen uygulama yükleme” iznini aç.<br>
      3. Kurulumu tamamla.<br>
      4. INVENTHOR açılır ve giriş ekranına gelir.
    </div>

    <div class="small">Beta sürüm • test kurulumu • hızlı indirme</div>
  </div>
</div>
</body>
</html>
